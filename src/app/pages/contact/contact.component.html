<!-- Contact Hero -->
<section class="hero-section" style="min-height:50vh;">
  <div class="container text-center position-relative" style="z-index:2;">
    <div data-aos="fade-up">
      <h1 class="hero-title" style="font-size:3rem;">Contact <span>Us</span></h1>
      <p class="hero-subtitle">We'd love to hear from you! 💬</p>
    </div>
  </div>
</section>

<!-- Contact Info Cards -->
<section class="section-padding">
  <div class="container">
    <div class="row g-4 mb-5">
      <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
        <div class="contact-card">
          <div class="contact-icon" style="background: var(--gradient-1);">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <h5>Address</h5>
          <p style="color:#666;"> 01, Prakash nagar indore naka(brahmakundi road)
            Dhar (MP)</p>
        </div>
      </div>
      <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
        <div class="contact-card">
          <div class="contact-icon" style="background: var(--gradient-2);">
            <i class="fas fa-phone"></i>
          </div>
          <h5>Phone</h5>
          <p style="color:#666;">+91 9993055658 / 8319980018</p>
        </div>
      </div>
      <div class="col-md-4" data-aos="fade-up" data-aos-delay="300">
        <div class="contact-card">
          <div class="contact-icon" style="background: var(--gradient-3);">
            <i class="fas fa-envelope"></i>
          </div>
          <h5>Email</h5>
          <p style="color:#666;">maa.sharda.school.dhar&#64;gmail.com</p>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="row justify-content-center" data-aos="fade-up">
      <div class="col-md-8">
        <div class="feature-card" style="text-align:left; padding:50px;">
          <h3 class="mb-4 fw-bold" style="color: var(--primary);">Send us a Message</h3>

          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="name" placeholder="Name" [(ngModel)]="name">
            <label for="name">Your Name</label>
          </div>

          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email" [(ngModel)]="email">
            <label for="email">Your Email</label>
          </div>

          <div class="form-floating mb-3">
            <textarea class="form-control" id="message" placeholder="Message" [(ngModel)]="message"
              style="height:120px;"></textarea>
            <label for="message">Your Message</label>
          </div>

          <button class="btn-submit" (click)="onSubmit()">
            Send Message <i class="fas fa-paper-plane ms-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
