<div class="auth-page">
  <div class="auth-card">
    <h2><i class="fas fa-user-plus me-2"></i>Register</h2>

    <!-- Role Selection -->
    <div class="role-tabs">
      <button [class.active]="selectedRole === 'admin'" (click)="selectedRole = 'admin'">
        <i class="fas fa-user-shield"></i> Admin
      </button>
      <button [class.active]="selectedRole === 'teacher'" (click)="selectedRole = 'teacher'">
        <i class="fas fa-chalkboard-teacher"></i> Teacher
      </button>
      <button [class.active]="selectedRole === 'student'" (click)="selectedRole = 'student'">
        <i class="fas fa-user-graduate"></i> Student
      </button>
    </div>

    <div class="form-floating">
      <input type="text" class="form-control" id="username" placeholder="Username" [(ngModel)]="username">
      <label for="username">👤 Username</label>
    </div>

    <div class="form-floating">
      <input type="password" class="form-control" id="password" placeholder="Password" [(ngModel)]="password">
      <label for="password">🔒 Password (min 6 chars)</label>
    </div>

    <button class="btn-submit" (click)="onRegister()" [disabled]="loading">
      <span *ngIf="!loading">Register as {{selectedRole | titlecase}} <i class="fas fa-arrow-right ms-2"></i></span>
      <span *ngIf="loading">Please wait...</span>
    </button>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
